---
# ─────────────────────────────────────────────────────────────────────────────
# Kustomize overlay – very-prince eBPF observability stack
#
# Apply the raw Prometheus CRD manifests only.
# Cilium, Pixie, and kube-prometheus-stack are installed via Helm (see
# docs/EBPF_OBSERVABILITY.md for the full procedure).
#
# Usage:
#   kubectl apply -k k8s/observability/
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  # Prometheus Operator CRD manifests (ServiceMonitor, PodMonitor, PrometheusRule)
  - prometheus-scrape-configs.yaml
  # Grafana dashboard ConfigMap (auto-imported by grafana-sc-dashboard)
  - grafana-dashboards/ebpf-kernel-io.yaml

commonLabels:
  app.kubernetes.io/part-of: very-prince
  app.kubernetes.io/managed-by: kustomize
